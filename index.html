<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chart.js v3 Interactive Line Chart</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    canvas {
      background: #1f2937;
      border-radius: 10px;
      padding: 10px;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #3b82f6;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📊 Chart.js v3 Dynamic Interactive Line Chart</h2>

    <canvas id="myChart"></canvas>

    <div>
      <button onclick="addData()">Add Data</button>
      <button onclick="randomizeData()">Randomize</button>
      <button onclick="removeData()">Remove Last</button>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('myChart').getContext('2d');

    let labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    let dataValues = [12, 19, 3, 5, 2, 10];

    const myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales Growth',
          data: dataValues,
          borderColor: '#38bdf8',
          backgroundColor: 'rgba(56, 189, 248, 0.2)',
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#facc15',
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: 'white' }
          }
        },
        scales: {
          x: {
            ticks: { color: 'white' },
            grid: { color: '#374151' }
          },
          y: {
            ticks: { color: 'white' },
            grid: { color: '#374151' }
          }
        }
      }
    });

    function addData() {
      const nextMonth = "M" + (labels.length + 1);
      labels.push(nextMonth);
      dataValues.push(Math.floor(Math.random() * 20));

      myChart.update();
    }

    function randomizeData() {
      dataValues = dataValues.map(() => Math.floor(Math.random() * 25));
      myChart.data.datasets[0].data = dataValues;
      myChart.update();
    }

    function removeData() {
      labels.pop();
      dataValues.pop();
      myChart.update();
    }
  </script>

</body>
</html>
