<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Drink Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
  }

  .container {
    width: 100%;
    max-width: 3000px;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
  }

  /* CHART LEFT + IMAGE RIGHT */
  .row {
    display: flex;
    gap: 20px;
    align-items: stretch;
    justify-content: center;
  }

  /* LEFT CHART */
  .chart-panel {
    flex: 2.5;
  }

  canvas {
    background: #1f2937;
    border-radius: 10px;
    padding: 10px;
  }

  /* 🖼 RIGHT IMAGE PANEL */
  .image-panel {
    flex: 1;
    background: #FFFFFF;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .image-panel img {
    width: 18%;
    border-radius: 12px;
    border: 2px solid #38bdf8;
  }

  .image-panel h3 {
    margin-bottom: 5px;
  }

  /* 🔘 thumbnails */
  .thumbs {
    margin-top: 5px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .thumbs img {
    width: 70px;
    height: 200px;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid transparent;
    transition: 0.2s;
  }

  .thumbs img:hover {
    border: 2px solid #38bdf8;
    transform: scale(1.05);
  }

  /* 📱 mobile */
  @media (max-width: 768px) {
    .row {
      flex-direction: column;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h2>Costa Coffee Comparison Dashboard</h2>

  <div class="row">

    <!-- 📊 LEFT CHART -->
    <div class="chart-panel">
      <canvas id="chart"></canvas>
    </div>

    <!-- 🖼 RIGHT IMAGE -->
    <div class="image-panel">
      <h3 id="drinkName">Drink A</h3>
      <img id="mainImage" src="img1.png" />
    </div>

  </div>

  <!-- THUMBNAILS -->
  <div class="thumbs">
    <img src="thumb1.png" onclick="loadDrink(0)">
    <img src="thumb2.png" onclick="loadDrink(1)">
    <img src="thumb3.png" onclick="loadDrink(2)">
  </div>
</div>

<script>
const ctx = document.getElementById("chart");

const drinks = [
  {
    name: "Costa Coffee Straight Forward",
    img: "img1.png",
    data: [10, 20, 30, 25, 40],
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
    color: "#38bdf8"
  },
  {
    name: "Costa Coffee Smooth Sidekick",
    img: "img2.png",
    data: [15, 25, 20, 35, 30],
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
    color: "#f97316"
  },
  {
    name: "Costa Coffee Dreamy Sidekick",
    img: "img3.png",
    data: [20, 10, 40, 30, 50],
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
    color: "#22c55e"
  }
];

const mainImage = document.getElementById("mainImage");
const drinkName = document.getElementById("drinkName");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: drinks[0].labels,
    datasets: [{
      label: drinks[0].name,
      data: drinks[0].data,
      borderColor: drinks[0].color,
      backgroundColor: drinks[0].color + "33",
      tension: 0.4,
      fill: true,
      pointRadius: 5
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    },
    scales: {
      x: { ticks: { color: "white" } },
      y: { ticks: { color: "white" } }
    }
  }
});

function loadDrink(index) {
  const d = drinks[index];

  // 📊 update chart
  chart.data.labels = d.labels;
  chart.data.datasets[0].data = d.data;
  chart.data.datasets[0].label = d.name;
  chart.data.datasets[0].borderColor = d.color;
  chart.data.datasets[0].backgroundColor = d.color + "33";
  chart.update();

  // 🖼 update image (RIGHT SIDE)
  mainImage.src = d.img;
  drinkName.textContent = d.name;
}
</script>

</body>
</html>
